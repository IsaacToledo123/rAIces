name: raices
description: rAIces app de turismo comunitario para el Istmo de Tehuantepec.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  get_it: ^7.7.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  equatable: ^2.0.5
  http: ^1.2.0
  url_launcher: ^6.3.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
